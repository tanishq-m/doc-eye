<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="900" y2="80" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="320" x2="900" y2="320" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="#6366f1" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="480" stroke="#6366f1" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="480" stroke="#6366f1" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="480" stroke="#6366f1" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="480" stroke="#6366f1" stroke-width="1"/>
    <line x1="750" y1="0" x2="750" y2="480" stroke="#6366f1" stroke-width="1"/>
  </g>

  <!-- Glow orbs -->
  <ellipse cx="100" cy="100" rx="120" ry="80" fill="#6366f1" opacity="0.06"/>
  <ellipse cx="800" cy="380" rx="140" ry="90" fill="#8b5cf6" opacity="0.07"/>
  <ellipse cx="450" cy="240" rx="100" ry="60" fill="#6366f1" opacity="0.04"/>

  <!-- Header -->
  <text x="450" y="52" text-anchor="middle" font-size="36" font-weight="800" letter-spacing="3" fill="url(#accent)" filter="url(#glow)">DOC-EYE</text>
  <text x="450" y="75" text-anchor="middle" font-size="13" fill="#94a3b8" letter-spacing="4" font-weight="400">MAKE YOUR DATA AI-READY</text>

  <!-- Top divider line -->
  <rect x="320" y="85" width="260" height="1" fill="url(#accent)" opacity="0.4" rx="1"/>

  <!-- === PIPELINE FLOW === -->
  <!-- Step 1: Upload -->
  <rect x="32" y="110" width="140" height="130" rx="12" fill="#1e1e2e" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/>
  <text x="102" y="138" text-anchor="middle" font-size="22">📄</text>
  <text x="102" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">UPLOAD</text>
  <text x="102" y="180" text-anchor="middle" font-size="10" fill="#64748b">PDF · DOCX</text>
  <text x="102" y="194" text-anchor="middle" font-size="10" fill="#64748b">Markdown · Text</text>
  <text x="102" y="213" text-anchor="middle" font-size="10" fill="#6366f1">Azure Doc Intel</text>
  <text x="102" y="227" text-anchor="middle" font-size="10" fill="#6366f1">Blob Storage</text>

  <!-- Arrow 1→2 -->
  <path d="M172 175 L205 175" stroke="#6366f1" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
  <polygon points="205,170 215,175 205,180" fill="#6366f1"/>

  <!-- Step 2: Extract -->
  <rect x="215" y="110" width="140" height="130" rx="12" fill="#1e1e2e" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9"/>
  <text x="285" y="138" text-anchor="middle" font-size="22">🔍</text>
  <text x="285" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">UNDERSTAND</text>
  <text x="285" y="180" text-anchor="middle" font-size="10" fill="#64748b">Entities · Relations</text>
  <text x="285" y="194" text-anchor="middle" font-size="10" fill="#64748b">Knowledge Graph</text>
  <text x="285" y="213" text-anchor="middle" font-size="10" fill="#8b5cf6">Azure OpenAI</text>
  <text x="285" y="227" text-anchor="middle" font-size="10" fill="#8b5cf6">AI Search</text>

  <!-- Arrow 2→3 -->
  <path d="M355 175 L388 175" stroke="#8b5cf6" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
  <polygon points="388,170 398,175 388,180" fill="#8b5cf6"/>

  <!-- Step 3: Score + Gaps -->
  <rect x="398" y="110" width="140" height="130" rx="12" fill="#1e1e2e" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
  <text x="468" y="138" text-anchor="middle" font-size="22">⚡</text>
  <text x="468" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">ACT</text>
  <text x="468" y="180" text-anchor="middle" font-size="10" fill="#64748b">Readiness Score</text>
  <text x="468" y="194" text-anchor="middle" font-size="10" fill="#64748b">Gap Detection</text>
  <text x="468" y="213" text-anchor="middle" font-size="10" fill="#10b981">Self-Healing Drafts</text>
  <text x="468" y="227" text-anchor="middle" font-size="10" fill="#10b981">Mistral LLM</text>

  <!-- Arrow 3→4 -->
  <path d="M538 175 L571 175" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
  <polygon points="571,170 581,175 571,180" fill="#10b981"/>

  <!-- Step 4: Ask -->
  <rect x="581" y="110" width="140" height="130" rx="12" fill="#1e1e2e" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
  <text x="651" y="138" text-anchor="middle" font-size="22">💬</text>
  <text x="651" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">ASK</text>
  <text x="651" y="180" text-anchor="middle" font-size="10" fill="#64748b">Grounded Q&amp;A</text>
  <text x="651" y="194" text-anchor="middle" font-size="10" fill="#64748b">Source Citations</text>
  <text x="651" y="213" text-anchor="middle" font-size="10" fill="#f59e0b">Persona Modes</text>
  <text x="651" y="227" text-anchor="middle" font-size="10" fill="#f59e0b">Mistral + Search</text>

  <!-- Arrow 4→5 -->
  <path d="M721 175 L754 175" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
  <polygon points="754,170 764,175 754,180" fill="#f59e0b"/>

  <!-- Step 5: Export -->
  <rect x="764" y="110" width="120" height="130" rx="12" fill="#1e1e2e" stroke="#ec4899" stroke-width="1.5" opacity="0.9"/>
  <text x="824" y="138" text-anchor="middle" font-size="22">🚀</text>
  <text x="824" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">EXPORT</text>
  <text x="824" y="180" text-anchor="middle" font-size="10" fill="#64748b">Claude · ChatGPT</text>
  <text x="824" y="194" text-anchor="middle" font-size="10" fill="#64748b">Gemini · Codex</text>
  <text x="824" y="213" text-anchor="middle" font-size="10" fill="#ec4899">API Key</text>
  <text x="824" y="227" text-anchor="middle" font-size="10" fill="#ec4899">JSON Bundle</text>

  <!-- === SELF-HEALING HIGHLIGHT === -->
  <rect x="32" y="264" width="836" height="62" rx="10" fill="#10b98114" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="286" text-anchor="middle" font-size="11" font-weight="700" fill="#10b981" letter-spacing="1">✦  SELF-HEALING KNOWLEDGE BASE  ✦</text>
  <text x="450" y="306" text-anchor="middle" font-size="11" fill="#94a3b8">Gap detected → Mistral generates a content draft → One-click accept → Graph updates → Score rises. Instantly.</text>
  <text x="450" y="320" text-anchor="middle" font-size="11" fill="#64748b">No manual writing. No separate tool. The knowledge base heals itself.</text>

  <!-- === STATS ROW === -->
  <!-- Stat 1 -->
  <rect x="32" y="348" width="150" height="68" rx="10" fill="#1e1e2e" stroke="#6366f130" stroke-width="1"/>
  <text x="107" y="374" text-anchor="middle" font-size="26" font-weight="800" fill="url(#accent)" filter="url(#glow)">186</text>
  <text x="107" y="394" text-anchor="middle" font-size="10" fill="#64748b">TESTS PASSING</text>
  <text x="107" y="408" text-anchor="middle" font-size="9" fill="#10b981">✓ All green</text>

  <!-- Stat 2 -->
  <rect x="200" y="348" width="150" height="68" rx="10" fill="#1e1e2e" stroke="#6366f130" stroke-width="1"/>
  <text x="275" y="374" text-anchor="middle" font-size="26" font-weight="800" fill="url(#accent)" filter="url(#glow)">15+</text>
  <text x="275" y="394" text-anchor="middle" font-size="10" fill="#64748b">API ROUTES</text>
  <text x="275" y="408" text-anchor="middle" font-size="9" fill="#10b981">✓ Live endpoints</text>

  <!-- Stat 3 -->
  <rect x="368" y="348" width="164" height="68" rx="10" fill="#1e1e2e" stroke="#6366f130" stroke-width="1"/>
  <text x="450" y="374" text-anchor="middle" font-size="26" font-weight="800" fill="url(#accent)" filter="url(#glow)">5</text>
  <text x="450" y="394" text-anchor="middle" font-size="10" fill="#64748b">AZURE SERVICES</text>
  <text x="450" y="408" text-anchor="middle" font-size="9" fill="#10b981">✓ Real pipeline</text>

  <!-- Stat 4 -->
  <rect x="550" y="348" width="150" height="68" rx="10" fill="#1e1e2e" stroke="#6366f130" stroke-width="1"/>
  <text x="625" y="374" text-anchor="middle" font-size="26" font-weight="800" fill="url(#accent)" filter="url(#glow)">5</text>
  <text x="625" y="394" text-anchor="middle" font-size="10" fill="#64748b">AI PERSONAS</text>
  <text x="625" y="408" text-anchor="middle" font-size="9" fill="#10b981">✓ Per-audience tone</text>

  <!-- Stat 5 -->
  <rect x="718" y="348" width="150" height="68" rx="10" fill="#1e1e2e" stroke="#6366f130" stroke-width="1"/>
  <text x="793" y="374" text-anchor="middle" font-size="26" font-weight="800" fill="url(#accent)" filter="url(#glow)">∞</text>
  <text x="793" y="394" text-anchor="middle" font-size="10" fill="#64748b">ORGS SUPPORTED</text>
  <text x="793" y="408" text-anchor="middle" font-size="9" fill="#10b981">✓ Fully isolated</text>

  <!-- Footer tagline -->
  <text x="450" y="452" text-anchor="middle" font-size="11" fill="#475569" letter-spacing="1">Microsoft Build AI Hackathon · June 2026</text>
  <rect x="300" y="460" width="300" height="1" fill="url(#accent)" opacity="0.2" rx="1"/>
  <text x="450" y="473" text-anchor="middle" font-size="10" fill="#334155" letter-spacing="2">NEXT.JS 16 · MISTRAL · AZURE AI · ZUSTAND</text>
</svg>
